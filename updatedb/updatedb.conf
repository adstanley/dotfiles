# /etc/updatedb.conf

PRUNE_BIND_MOUNTS="yes"

# Filesystem types to exclude
PRUNEFS="9p afs anon_inodefs auto autofs bdev binfmt_misc cgroup cifs coda configfs cpuset debugfs devpts ecryptfs exofs fuse fuse.sshfs fusectl gfs gfs2 gpfs hugetlbfs inotifyfs iso9660 jffs2 mqueue ncpfs nfs nfs4 nfsd pipefs proc ramfs rootfs rpc_pipefs securityfs selinuxfs sfs sockfs sysfs tmpfs ubifs udf usbfs vboxsf"

# Directory paths to exclude
PRUNEPATHS="/tmp /var/spool /mnt/nfs /mnt/spool/SABnzbd/Incomplete /mnt/spool/SABnzbd/.nzb"

# Directory names to exclude (basename only, applies everywhere)
PRUNENAMES=".git .hg .svn .bzr"